<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta charset="UTF-8">
  <title>EV Route Planner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

  <link rel="stylesheet" type="text/css" href="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.36.1/maps/maps.css">
  <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.36.1/maps/maps-web.min.js"></script>
  <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.36.1/services/services-web.min.js"></script>
  <script src="chargingAvailability.js?v=3"></script>
  <script src="calculateLongDistanceEVRoute.js?v=3"></script>
  <script src="ev_model.js?v=3"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #1b2432;
      background: #f3f6fb;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }

    #left {
      width: 100%;
      overflow-y: auto;
      border-right: 1px solid #dce5f0;
      background: #ffffff;
      padding: 14px;
    }

    #right {
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      margin: 4px 0 16px;
    }

    .banner {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #dce5f0;
      margin-bottom: 12px;
    }

    .sub {
      color: #64748b;
      font-size: 14px;
      margin: 0 0 16px;
    }

    .panel {
      border: 1px solid #dce5f0;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fbfdff;
    }

    input.text {
      margin-bottom: 10px;
      width: 100%;
      display: block;
      padding: 10px 12px;
      border: 1px solid #c8d4e3;
      border-radius: 10px;
      font-size: 14px;
    }

    .btn {
      background-color: #1677ff;
      color: white;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 0;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #0f67df;
    }

    .loc {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #334155;
    }

    #summary {
      margin-top: 6px;
      font-size: 14px;
      color: #243145;
      line-height: 1.55;
    }

    #summary h1, #summary h2, #summary h3, #summary h4, #summary h5, #summary h6 {
      margin: 10px 0 8px;
      font-size: 15px;
    }

    .links a {
      display: block;
      color: #1f5cb8;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 60vh;
      }
      #left {
        width: auto;
        border-right: 0;
        border-bottom: 1px solid #dce5f0;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="left">
      <div class="brand">EV Route Planner</div>
      <img class="banner" src="image/map.jpg" alt="Route planning banner">
      <p class="sub">Provide start and destination points to calculate an EV route and summary details.</p>

      <div id="controls" class="panel">
        <label for="start" class="loc">Starting Location</label>
        <input class="text" id="start" type="text" placeholder="e.g. Pune">

        <label for="finish" class="loc">Destination</label>
        <input class="text" id="finish" type="text" placeholder="e.g. Bengaluru">

        <input id="calculate" type="button" class="btn" value="Calculate Route" onclick="findStart()">
      </div>

      <div class="panel">
        <div class="loc">Route Summary</div>
        <div id="summary">Route details will appear here after calculation.</div>
      </div>

      <div class="panel links">
        <a href="home.html">Home</a>
        <a href="ev_search.html">Station Search</a>
        <a href="traffic.html">Traffic Map</a>
      </div>
    </div>

    <div id="right">
      <div id="map" class="map"></div>
    </div>
  </div>

  <script src="ev_routing.js?v=3"></script>
</body>
</html>
