<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta charset="UTF-8">
  <title>EV Station Search</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

  <link rel="stylesheet" type="text/css" href="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.36.1/maps/maps.css">
  <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.36.1/maps/maps-web.min.js"></script>
  <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/5.x/5.36.1/services/services-web.min.js"></script>
  <script src="chargingAvailability.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #1b2432;
      background: #f3f6fb;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }

    #left {
      width: 100%;
      overflow-y: auto;
      border-right: 1px solid #dce5f0;
      background: #ffffff;
      padding: 14px;
    }

    #right {
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      margin: 4px 0 16px;
    }

    .banner {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #dce5f0;
      margin-bottom: 12px;
    }

    .sub {
      color: #64748b;
      font-size: 14px;
      margin: 0 0 16px;
    }

    .panel {
      border: 1px solid #dce5f0;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fbfdff;
    }

    div.mapboxgl-popup-content>h3 {
      margin: 0;
    }

    input.text {
      margin-bottom: 10px;
      line-height: 1.3;
      width: 100%;
      display: block;
      padding: 10px 12px;
      border: 1px solid #c8d4e3;
      border-radius: 10px;
      font-size: 14px;
    }

    .btn {
      background-color: #1677ff;
      color: white;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 0;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #0f67df;
    }

    .loc {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #334155;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .links a {
      color: #1f5cb8;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 60vh;
      }
      #left {
        width: auto;
        border-right: 0;
        border-bottom: 1px solid #dce5f0;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="left">
      <div class="brand">EV Station Search</div>
      <img class="banner" src="image/stations.jpg" alt="Charging station banner">
      <p class="sub">Enter a location and choose a search radius to view nearby charging stations.</p>

      <div id="controls" class="panel">
        <label for="location" class="loc">Location</label>
        <input class="text" id="location" type="text" placeholder="e.g. Mumbai">

        <label for="distance" class="loc">Maximum Distance (km)</label>
        <input class="text" id="distance" type="text" value="10">

        <input type="button" class="btn" value="Find Stations" onclick="findLocation()">
      </div>

      <div class="panel">
        <div class="loc">Quick navigation</div>
        <div class="links">
          <a href="home.html">Home</a>
          <a href="ev_routing.html">Route Planner</a>
          <a href="traffic.html">Traffic Map</a>
        </div>
      </div>
    </div>
    <div id="right">
      <div id="map" class="map"></div>
    </div>
  </div>

  <script src="ev_search.js"></script>
</body>
</html>
